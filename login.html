<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLP Paper Survey — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f6f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .login-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 36px 40px;
      width: 360px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 600;
    }
    .subtitle {
      margin: 0 0 24px;
      font-size: 13px;
      color: #666;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    input:focus {
      outline: none;
      border-color: #4a6fa5;
      box-shadow: 0 0 0 2px rgba(74,111,165,0.2);
    }
    button[type="submit"] {
      width: 100%;
      padding: 9px;
      background: #4a6fa5;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button[type="submit"]:hover { background: #3d5d8f; }
    button[type="submit"]:disabled { background: #999; cursor: default; }
    .error-msg {
      display: none;
      background: #fde8e8;
      border: 1px solid #f5c6c6;
      color: #b91c1c;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>SLP Paper Survey</h1>
    <p class="subtitle">Sign in to continue</p>
    <div id="error-msg" class="error-msg">Incorrect email or password.</div>
    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit" id="submit-btn">Sign in</button>
    </form>
  </div>
  <script>
    const PB_URL = 'http://localhost:8090';
    const SESSION_TTL_MS = 24 * 60 * 60 * 1000;
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || 'index.html';

    // Already logged in with a valid token? Skip the form.
    const _t = localStorage.getItem('pb_token');
    const _e = localStorage.getItem('pb_token_expiry');
    if (_t && _e && Date.now() < Number(_e)) {
      window.location.href = next;
    }

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.classList.remove('visible');
      errEl.textContent = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        let res;
        try {
          res = await fetch(
            `${PB_URL}/api/collections/users/auth-with-password`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ identity: email, password }),
            }
          );
        } catch {
          errEl.textContent = `Cannot reach backend (${PB_URL}). Is it running?`;
          errEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Sign in';
          return;
        }
        if (!res.ok) throw new Error('auth failed');
        const { token, record } = await res.json();
        localStorage.setItem('pb_token', token);
        localStorage.setItem('pb_user_id', record.id);
        localStorage.setItem('pb_token_expiry', String(Date.now() + SESSION_TTL_MS));
        localStorage.setItem('pb_email', email);
        window.location.href = next;
      } catch {
        errEl.textContent = 'Incorrect email or password.';
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
