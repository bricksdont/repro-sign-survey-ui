<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLP Paper Survey</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="overview">
    <div class="overview-header">
      <h1>Paper Survey</h1>
      <div class="header-actions">
        <button id="review-next-btn" class="btn-primary">Review Next &#8594;</button>
        <button id="reset-btn" class="btn-reset">Reset to seed data</button>
      </div>
    </div>
    <div id="stats-row" class="stats-row"></div>

    <div class="filter-bar">
      <input type="text" id="search-input" class="search-input" placeholder="Search by ID or title…">
      <div class="status-filters">
        <button class="filter-btn active" data-status="all">All</button>
        <button class="filter-btn" data-status="needs_review">Needs Review</button>
        <button class="filter-btn" data-status="flagged">Flagged</button>
        <button class="filter-btn" data-status="rejected">Rejected</button>
        <button class="filter-btn" data-status="final">Final</button>
      </div>
    </div>

    <table class="papers-table">
      <thead>
        <tr>
          <th>Paper ID</th>
          <th>Title</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="papers-tbody"></tbody>
    </table>
  </div>
  <script src="overview.js"></script>
</body>
</html>
