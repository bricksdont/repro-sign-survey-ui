<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLP Paper Survey</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="overview">
    <div class="overview-header">
      <h1>Paper Survey</h1>
      <button id="reset-btn" class="btn-reset">Reset to seed data</button>
    </div>
    <div id="stats-row" class="stats-row"></div>

    <table class="papers-table">
      <thead>
        <tr>
          <th>Paper ID</th>
          <th>Title</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="papers-tbody"></tbody>
    </table>
  </div>
  <script src="overview.js"></script>
</body>
</html>
