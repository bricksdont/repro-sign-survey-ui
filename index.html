<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLP Paper Survey</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="landing">
    <div class="landing-header">
      <h1>SLP Paper Survey</h1>
      <div class="account-menu">
        <button id="account-btn" class="btn-account">Account</button>
        <div id="account-dropdown" class="account-dropdown hidden">
          <div id="account-email" class="account-email"></div>
          <hr class="account-divider">
          <button id="logout-btn" class="btn-logout">Log out</button>
        </div>
      </div>
    </div>

    <div class="task-cards">
      <a href="review-index.html" class="task-card">
        <div class="task-card-title">Reviewing</div>
        <div class="task-card-desc">Add metadata: code repositories, datasets, metrics</div>
      </a>
      <a href="check-index.html" class="task-card">
        <div class="task-card-title">Checking</div>
        <div class="task-card-desc">Verify empirical results and Sign Language Processing scope</div>
      </a>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    requireAuth();
    document.getElementById('account-email').textContent = getEmail() || getUserId() || 'Unknown user';
    document.getElementById('account-btn').addEventListener('click', e => {
      e.stopPropagation();
      document.getElementById('account-dropdown').classList.toggle('hidden');
    });
    document.getElementById('logout-btn').addEventListener('click', () => {
      logout();
      window.location.href = 'login.html';
    });
    document.addEventListener('click', () => {
      document.getElementById('account-dropdown').classList.add('hidden');
    });
  </script>
</body>
</html>
