<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLP Paper Survey</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- Left panel: PDF viewer (native browser viewer via proxy iframe) -->
    <div class="panel pdf-panel">
      <iframe id="pdf-iframe" title="PDF viewer"></iframe>
    </div>

    <!-- Draggable divider -->
    <div id="divider"></div>

    <!-- Right panel: Metadata form -->
    <div class="panel meta-panel">

      <div class="meta-header">
        <div class="meta-header-left">
          <a href="index.html" class="back-link">&#8592; Overview</a>
          <button id="copy-link-btn" class="copy-link-btn" title="Copy link to this paper">&#128279; Copy link</button>
        </div>
        <div class="paper-nav">
          <button id="prev-paper" title="Previous paper" disabled>&#9664;</button>
          <span id="paper-counter">1 / 1</span>
          <button id="next-paper" title="Next paper" disabled>&#9654;</button>
        </div>
      </div>

      <div class="status-row">
        <span id="status-badge" class="status-badge status-needs-review">&#9679; Needs Review</span>
        <button id="clear-status-btn" class="clear-status-btn hidden" aria-label="Clear status"></button>
      </div>

      <!-- Title -->
      <div class="field-group">
        <label>Title</label>
        <div class="field-row">
          <span class="field-display" id="display-title"></span>
          <input type="text" class="field-input hidden" id="input-title" placeholder="Paper title">
          <button class="edit-btn hidden" id="edit-title" title="Edit">&#9998;</button>
        </div>
      </div>

      <!-- Year -->
      <div class="field-group">
        <label>Year</label>
        <div class="field-row">
          <span class="field-display" id="display-year"></span>
          <input type="number" class="field-input hidden" id="input-year" placeholder="e.g. 2024" min="1900" max="2100">
          <button class="edit-btn hidden" id="edit-year" title="Edit">&#9998;</button>
        </div>
      </div>

      <!-- Venue -->
      <div class="field-group">
        <label>Venue</label>
        <div class="field-row">
          <span class="field-display" id="display-venue"></span>
          <input type="text" class="field-input hidden" id="input-venue" placeholder="e.g. EMNLP, ACL, NAACL">
          <button class="edit-btn hidden" id="edit-venue" title="Edit">&#9998;</button>
        </div>
      </div>

      <!-- Peer-reviewed -->
      <div class="field-group">
        <label>Peer-Reviewed</label>
        <div class="radio-row">
          <label class="radio-option">
            <input type="radio" name="peer-reviewed" value="yes"> Yes
          </label>
          <label class="radio-option">
            <input type="radio" name="peer-reviewed" value="no"> No
          </label>
        </div>
      </div>

      <!-- Code repositories -->
      <div class="field-group">
        <label>Code Repositories</label>
        <div class="tag-container" id="code-repos-container"></div>
        <div class="tag-input-row">
          <input type="url" id="code-repo-input" placeholder="https://github.com/…" autocomplete="off">
          <button id="add-code-repo-btn">+ Add</button>
        </div>
      </div>

      <!-- Datasets -->
      <div class="field-group">
        <label>Datasets</label>
        <div class="tag-container" id="datasets-container"></div>
        <div class="tag-input-wrapper">
          <div class="tag-input-row">
            <input type="text" id="dataset-input" placeholder="Add dataset…" autocomplete="off">
            <button id="add-dataset-btn">+ Add</button>
          </div>
          <div id="dataset-suggestions" class="suggestions-dropdown hidden"></div>
        </div>
      </div>

      <!-- Metrics -->
      <div class="field-group">
        <label>Metrics</label>
        <div class="tag-container" id="metrics-container"></div>
        <div class="tag-input-wrapper">
          <div class="tag-input-row">
            <input type="text" id="metric-input" placeholder="Add metric…" autocomplete="off">
            <button id="add-metric-btn">+ Add</button>
          </div>
          <div id="metric-suggestions" class="suggestions-dropdown hidden"></div>
        </div>
      </div>

      <div class="form-footer">
        <button id="save-btn" class="btn-secondary">Save</button>
        <button id="save-next-btn" class="btn-primary">Save &amp; Next &#8594;</button>
        <button id="flag-btn" class="btn-flag">Flag</button>
        <button id="reject-btn" class="btn-danger">Reject</button>
        <span id="save-confirm" class="save-confirm hidden">Saved &#10003;</span>
      </div>

    </div>

  </div>

  <!-- Flag dialog -->
  <div id="flag-overlay" class="modal-overlay hidden">
    <div class="modal-dialog">
      <h3 class="modal-title">Flag Paper</h3>
      <p class="modal-subtitle">Select a reason for flagging:</p>
      <div class="reject-options">
        <label class="reject-option">
          <input type="radio" name="flag-reason" value="Unclear which experiment is the main one">
          Unclear which experiment is the main one
        </label>
        <label class="reject-option">
          <input type="radio" name="flag-reason" value="Unclear if method is computational">
          Unclear if method is computational
        </label>
        <label class="reject-option">
          <input type="radio" name="flag-reason" value="other">
          Other (explain):
        </label>
        <textarea id="flag-other-text" class="reject-other-text hidden" placeholder="Describe the reason&#8230;" rows="3"></textarea>
      </div>
      <div class="modal-footer">
        <button id="flag-cancel-btn" class="btn-secondary">Cancel</button>
        <button id="flag-confirm-btn" class="btn-flag" disabled>Flag</button>
      </div>
    </div>
  </div>

  <!-- Rejection dialog -->
  <div id="reject-overlay" class="modal-overlay hidden">
    <div class="modal-dialog">
      <h3 class="modal-title">Reject Paper</h3>
      <p class="modal-subtitle">Select a reason for rejection:</p>
      <div class="reject-options">
        <label class="reject-option">
          <input type="radio" name="reject-reason" value="Paper is not on Sign Language Processing">
          Paper is not on Sign Language Processing
        </label>
        <label class="reject-option">
          <input type="radio" name="reject-reason" value="Does not have quantitative experiments">
          Does not have quantitative experiments
        </label>
        <label class="reject-option">
          <input type="radio" name="reject-reason" value="Not published between 2017 and 2026">
          Not published between 2017 and 2026
        </label>
        <label class="reject-option">
          <input type="radio" name="reject-reason" value="other">
          Other (explain):
        </label>
        <textarea id="reject-other-text" class="reject-other-text hidden" placeholder="Describe the reason&#8230;" rows="3"></textarea>
      </div>
      <div class="modal-footer">
        <button id="reject-cancel-btn" class="btn-secondary">Cancel</button>
        <button id="reject-confirm-btn" class="btn-danger" disabled>Reject</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
