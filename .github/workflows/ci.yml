name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Python syntax — server.py
        run: python3 -m py_compile server.py && echo "✓ server.py OK"

      - name: JSON schema — data.json
        run: python3 scripts/validate_data.py

      - name: JS syntax
        run: |
          for f in app.js overview.js check-app.js check-overview.js; do
            node --check "$f" && echo "✓ $f OK"
          done

      - name: HTML validation
        run: npm run validate:html

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        run: npx playwright test
